name: Scrape Canva Schedule

on:
  schedule:
    - cron: '0 12 * * 1-5'  # 7am ET = 12pm UTC, weekdays only
  workflow_dispatch:         # also allows manual trigger from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright
        run: |
          npm init -y
          npm install playwright
          npx playwright install chromium --with-deps

      - name: Run scraper
        run: node scrape-schedule.js

      - name: Commit and push schedule.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add schedule.json
          git diff --staged --quiet || git commit -m "Update schedule.json [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
