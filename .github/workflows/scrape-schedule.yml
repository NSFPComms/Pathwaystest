name: Scrape Canva Schedule

on:
  schedule:
    - cron: '0 12 * * 1-5'   # 7am ET = 12pm UTC, weekdays (scrape daily)
    - cron: '30 12 * * 5'    # 7:30am ET every Friday (generate email after scrape)
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright
        run: |
          npm init -y
          npm install playwright
          npx playwright install chromium --with-deps

      - name: Scrape schedule
        run: node scrape-schedule.js

      - name: Generate email (Fridays only)
        if: github.event.schedule == '30 12 * * 5' || github.event_name == 'workflow_dispatch'
        run: node generate-email.js

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add schedule.json email-body.html email-subject.txt
          git diff --staged --quiet || git commit -m "Update schedule [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
