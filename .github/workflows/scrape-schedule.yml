name: Scrape Canva Schedule
on:
  schedule:
    - cron: '0 12 * * 1-5'   # 7am ET = 12pm UTC, weekdays (scrape daily)
    - cron: '30 12 * * 5'    # 7:30am ET every Friday (generate email after scrape)
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright
        run: |
          npm init -y
          npm install playwright
          npx playwright install chromium --with-deps

      - name: Scrape schedule
        run: node scrape-schedule.js

      - name: Commit schedule.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add schedule.json
          git diff --staged --quiet || git commit -m "Scrape schedule [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git pull --rebase origin main && git push

  generate-email:
    runs-on: ubuntu-latest
    needs: scrape   # waits for scrape to finish and push before starting
    if: github.event.schedule == '30 12 * * 5' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4  # gets the freshly scraped schedule.json

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate email
        run: node generate-email.js

      - name: Commit email files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add email-body.html email-subject.txt
          git diff --staged --quiet || git commit -m "Generate email [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git pull --rebase origin main && git push
